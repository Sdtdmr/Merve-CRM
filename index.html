<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merve Optik CRM</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (In-browser JSX compilation) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS (CDN for rapid deployment) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- YENİ: Chart.js (Grafikler için) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-gray-900 selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel">
        // --- İkon Düzeltmesi ---
        const toPascalCase = (str) => str.replace(/(^\w|-\w)/g, (m) => m.replace('-', '').toUpperCase());

        const buildSvgNode = (node) => {
            const [tag, attrs, children] = node;
            const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
            Object.entries(attrs || {}).forEach(([k, v]) => el.setAttribute(k, v));
            (children || []).forEach((child) => el.appendChild(buildSvgNode(child)));
            return el;
        };

        const Icon = ({ name, size = 24, className = '', strokeWidth = 2 }) => {
            const iconRef = React.useRef(null);
            React.useEffect(() => {
                if (!iconRef.current || !window.lucide || !window.lucide.icons) return;
                const pascalName = toPascalCase(name);
                const iconNode = window.lucide.icons[pascalName];
                if (!iconNode) return;

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                svg.setAttribute('width', size);
                svg.setAttribute('height', size);
                svg.setAttribute('viewBox', '0 0 24 24');
                svg.setAttribute('fill', 'none');
                svg.setAttribute('stroke', 'currentColor');
                svg.setAttribute('stroke-width', strokeWidth);
                svg.setAttribute('stroke-linecap', 'round');
                svg.setAttribute('stroke-linejoin', 'round');
                if (className) svg.setAttribute('class', className);

                iconNode.forEach((child) => svg.appendChild(buildSvgNode(child)));
                iconRef.current.innerHTML = '';
                iconRef.current.appendChild(svg);
            }, [name, size, className, strokeWidth]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const PlusIcon = ({ size = 24, strokeWidth = 2, className = '' }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        // YENİ: Grafik (Chart) Bileşeni
        const SimpleChart = ({ type, data, options }) => {
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            React.useEffect(() => {
                if (!chartRef.current || !window.Chart) return;
                
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new window.Chart(ctx, {
                    type: type,
                    data: data,
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                        },
                        ...options 
                    }
                });

                return () => {
                    if (chartInstance.current) chartInstance.current.destroy();
                };
            }, [type, data, options]);

            return (
                <div className="relative h-64 w-full">
                    <canvas ref={chartRef}></canvas>
                </div>
            );
        };

        // --- Sabit Kullanıcı Listesi ---
        const USERS = [
            { id: 'rep1', name: 'Sedat Demir', role: 'rep', iconColor: 'bg-blue-100 text-blue-700' },
            { id: 'rep2', name: 'Engin Kaleli', role: 'rep', iconColor: 'bg-indigo-100 text-indigo-700' },
            { id: 'manager', name: 'Yönetici', role: 'manager', iconColor: 'bg-slate-800 text-white' }
        ];

        const DEFAULT_PASSWORDS = { rep1: 'sedat', rep2: 'engin', manager: '123' };

        // --- FİREBASE AYARLARI ---
        const firebaseConfig = {
            apiKey: "AIzaSyCr_0GwQ3neDP-sdQECPKpLj2t_60Qa1MA",
            authDomain: "merve-optik.firebaseapp.com",
            projectId: "merve-optik",
            storageBucket: "merve-optik.firebasestorage.app",
            messagingSenderId: "584726216959",
            appId: "1:584726216959:web:e5504139e05d92b7afccca",
            measurementId: "G-HWNGL541HZ"
        };

        const isDummyConfig = firebaseConfig.apiKey === "BURAYA_API_KEY_GELECEK" || firebaseConfig.apiKey.includes("AIzaSy...");

        let auth = null;
        let db = null;

        if (!isDummyConfig) {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            auth = firebase.auth();
            db = firebase.firestore();
        }

        const getLocalDateISO = () => {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        };

        const generateDates = () => {
            const dates = [];
            const today = new Date();
            for(let i = -3; i <= 14; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                dates.push({
                    fullDate: d.toISOString().split('T')[0],
                    dayNum: d.getDate(),
                    dayStr: d.toLocaleDateString('tr-TR', { weekday: 'short' }),
                    monthStr: d.toLocaleDateString('tr-TR', { month: 'short' }),
                    isToday: i === 0
                });
            }
            return dates;
        };

        function App() {
            if (isDummyConfig) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-6">
                        <div className="bg-white p-8 rounded-3xl shadow-xl text-center max-w-md border-t-4 border-red-500">
                            <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="alert-triangle" size={40} /></div>
                            <h1 className="text-2xl font-black text-gray-800 mb-4">Eksik Kurulum!</h1>
                            <p className="text-gray-600 font-medium leading-relaxed mb-6">Firebase yapılandırması eksik.</p>
                        </div>
                    </div>
                );
            }

            const todayISO = getLocalDateISO();

            const [firebaseUser, setFirebaseUser] = React.useState(null);
            const [activeProfile, setActiveProfile] = React.useState(() => {
                const saved = localStorage.getItem('crm_active_profile');
                return saved ? JSON.parse(saved) : null;
            });

            // Veritabanı State'leri
            const [units, setUnits] = React.useState([]); 
            const [doctors, setDoctors] = React.useState([]);
            const [visits, setVisits] = React.useState([]);
            const [plans, setPlans] = React.useState([]); 
            const [userPasswords, setUserPasswords] = React.useState({});
            const [loading, setLoading] = React.useState(true);

            // Arayüz State'leri
            const [activeTab, setActiveTab] = React.useState('plans');
            const [isAddUnitOpen, setIsAddUnitOpen] = React.useState(false); 
            const [isAddDoctorOpen, setIsAddDoctorOpen] = React.useState(false);
            const [visitingDoctor, setVisitingDoctor] = React.useState(null); 
            const [isQuickVisitOpen, setIsQuickVisitOpen] = React.useState(false);
            const [isChangePasswordOpen, setIsChangePasswordOpen] = React.useState(false);
            const [quickSearchTerm, setQuickSearchTerm] = React.useState('');
            const [searchTerm, setSearchTerm] = React.useState('');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [toast, setToast] = React.useState({ show: false, message: '', type: 'success' });
            
            // Edit State'leri
            const [isEditUnitOpen, setIsEditUnitOpen] = React.useState(false);
            const [editUnitData, setEditUnitData] = React.useState(null);
            const [isEditDoctorOpen, setIsEditDoctorOpen] = React.useState(false);
            const [editDoctorData, setEditDoctorData] = React.useState(null);

            const [repVisitDateFilter, setRepVisitDateFilter] = React.useState(todayISO);
            const [managerVisitDateFilter, setManagerVisitDateFilter] = React.useState(todayISO);

            const [loginStep, setLoginStep] = React.useState('select_profile');
            const [selectedProfileForLogin, setSelectedProfileForLogin] = React.useState(null);
            const [passwordInput, setPasswordInput] = React.useState('');

            const [currentPasswordInput, setCurrentPasswordInput] = React.useState('');
            const [newPasswordInput, setNewPasswordInput] = React.useState('');
            const [confirmPasswordInput, setConfirmPasswordInput] = React.useState('');

            const [newUnit, setNewUnit] = React.useState({ type: 'hastane', name: '', city: '' });
            const [newDoctor, setNewDoctor] = React.useState({ type: 'doktor', name: '', unitId: '' }); 
            const [newVisit, setNewVisit] = React.useState({ date: todayISO, notes: '' });

            const calendarDates = React.useMemo(() => generateDates(), []);
            const [selectedDate, setSelectedDate] = React.useState(todayISO);
            const [isAddPlanOpen, setIsAddPlanOpen] = React.useState(false);
            const [newPlan, setNewPlan] = React.useState({ unitId: '' });
            const [planVisit, setPlanVisit] = React.useState({ plan: null, doctorId: '', notes: '' });

            React.useEffect(() => {
                auth.signInAnonymously().catch(error => console.error("Auth Error:", error));
                const unsubscribe = auth.onAuthStateChanged(user => setFirebaseUser(user));
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!firebaseUser) return;
                const unsubCredentials = db.collection('userCredentials').onSnapshot((snapshot) => {
                    const pw = {};
                    snapshot.docs.forEach(d => { pw[d.id] = d.data().password; });
                    setUserPasswords(pw);
                });
                return () => unsubCredentials();
            }, [firebaseUser]);

            React.useEffect(() => {
                if (!firebaseUser || !activeProfile) {
                    setLoading(false);
                    return;
                }
                setLoading(true);

                const unsubUnits = db.collection('units').onSnapshot((snapshot) => {
                    const u = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    u.sort((a, b) => a.name.localeCompare(b.name, 'tr-TR'));
                    setUnits(u);
                });

                const unsubDoctors = db.collection('doctors').onSnapshot((snapshot) => {
                    const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    docs.sort((a, b) => {
                        const hospitalCompare = (a.hospital || '').localeCompare(b.hospital || '', 'tr-TR');
                        if (hospitalCompare !== 0) return hospitalCompare;
                        return a.name.localeCompare(b.name, 'tr-TR');
                    });
                    setDoctors(docs);
                });

                const unsubVisits = db.collection('visits').onSnapshot((snapshot) => {
                    const v = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    v.sort((a, b) => b.createdAt - a.createdAt);
                    setVisits(v);
                });

                const unsubPlans = db.collection('plans').onSnapshot((snapshot) => {
                    const p = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    p.sort((a, b) => a.createdAt - b.createdAt);
                    setPlans(p);
                    setLoading(false);
                });

                return () => { unsubUnits(); unsubDoctors(); unsubVisits(); unsubPlans(); };
            }, [firebaseUser, activeProfile]);

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
            };

            const getPasswordFor = (profileId) => {
                return userPasswords[profileId] !== undefined ? userPasswords[profileId] : DEFAULT_PASSWORDS[profileId];
            };

            const handleProfileSelect = (profile) => {
                setSelectedProfileForLogin(profile);
                setLoginStep('password_prompt');
                setPasswordInput('');
            };

            const handlePasswordSubmit = (e) => {
                e.preventDefault();
                const correctPassword = getPasswordFor(selectedProfileForLogin.id);
                if (passwordInput === correctPassword) {
                    executeLogin(selectedProfileForLogin);
                } else {
                    showToast('Hatalı şifre girdiniz!', 'error');
                    setPasswordInput('');
                }
            };

            const executeLogin = (profile) => {
                setActiveProfile(profile);
                localStorage.setItem('crm_active_profile', JSON.stringify(profile));
                setActiveTab(profile.role === 'manager' ? 'manager-stats' : 'plans'); // Yönetici için istatistikleri açsın
                setLoginStep('select_profile');
                setSelectedProfileForLogin(null);
            };

            const handleLogout = () => {
                setActiveProfile(null);
                localStorage.removeItem('crm_active_profile');
                setIsMobileMenuOpen(false);
            };

            const handleChangePassword = async (e) => {
                e.preventDefault();
                const correctPassword = getPasswordFor(activeProfile.id);

                if (currentPasswordInput !== correctPassword) {
                    showToast('Mevcut şifreniz hatalı.', 'error'); return;
                }
                if (!newPasswordInput || newPasswordInput.trim().length < 3) {
                    showToast('Yeni şifre en az 3 karakter olmalı.', 'error'); return;
                }
                if (newPasswordInput !== confirmPasswordInput) {
                    showToast('Yeni şifreler birbiriyle eşleşmiyor!', 'error'); return;
                }

                try {
                    await db.collection('userCredentials').doc(activeProfile.id).set({ password: newPasswordInput }, { merge: true });
                    showToast('Şifreniz başarıyla güncellendi.');
                    setIsChangePasswordOpen(false);
                    setCurrentPasswordInput(''); setNewPasswordInput(''); setConfirmPasswordInput('');
                } catch (error) { showToast('Şifre değiştirilirken bir hata oluştu.', 'error'); }
            };

            const handleAddPlan = async (e) => {
                e.preventDefault();
                if (!firebaseUser || !newPlan.unitId) { showToast('Lütfen bir ünite seçin.', 'error'); return; }

                const selectedUnit = units.find(u => u.id === newPlan.unitId);
                if (!selectedUnit) return;

                const isDuplicate = plans.some(p => p.repId === activeProfile.id && p.date === selectedDate && p.unitId === selectedUnit.id);
                if(isDuplicate) { showToast('Bu ünite bu güne zaten planlanmış.', 'error'); return; }

                try {
                    await db.collection('plans').add({
                        date: selectedDate,
                        unitId: selectedUnit.id,
                        unitName: selectedUnit.name,
                        unitCity: selectedUnit.city,
                        unitType: selectedUnit.type,
                        repId: activeProfile.id,
                        repName: activeProfile.name,
                        createdAt: Date.now()
                    });
                    setNewPlan({ unitId: '' });
                    setIsAddPlanOpen(false);
                    showToast('Plan başarıyla eklendi.');
                } catch (error) { showToast('Plan eklenirken hata oluştu.', 'error'); }
            };

            const handleDeletePlan = async (planId) => {
                try {
                    await db.collection('plans').doc(planId).delete();
                    showToast('Plan iptal edildi.');
                } catch (error) {}
            };

            const handlePlanVisitSubmit = async (e) => {
                e.preventDefault();
                if (!planVisit.plan || !planVisit.doctorId) { showToast('Lütfen ziyaret ettiğiniz kontağı (kişiyi) seçin.', 'error'); return; }
                const doctor = doctors.find(d => d.id === planVisit.doctorId);
                if(!doctor) return;

                const isDuplicate = visits.some(visit => visit.repId === activeProfile.id && visit.doctorId === doctor.id && visit.date === planVisit.plan.date);
                if (isDuplicate) { showToast('Bu kontağa bu güne zaten ziyaret girilmiş!', 'error'); return; }

                try {
                    await db.collection('visits').add({
                        doctorId: doctor.id,
                        doctorType: doctor.type || 'doktor',
                        doctorName: doctor.name,
                        doctorHospital: doctor.hospital,
                        repId: activeProfile.id,
                        repName: activeProfile.name,
                        date: planVisit.plan.date,
                        notes: planVisit.notes,
                        createdAt: Date.now()
                    });
                    
                    setPlanVisit({ plan: null, doctorId: '', notes: '' });
                    showToast('Ziyaret başarıyla gerçekleşti!');
                } catch (error) { showToast('Ziyaret kaydedilirken hata oluştu.', 'error'); }
            };

            const handleAddUnit = async (e) => {
                e.preventDefault();
                if (!newUnit.name.trim() || !newUnit.city.trim()) return;

                try {
                    await db.collection('units').add({
                        type: newUnit.type,
                        name: newUnit.name,
                        city: newUnit.city,
                        addedByProfileId: activeProfile.id,
                        addedByName: activeProfile.name,
                        createdAt: Date.now()
                    });
                    setNewUnit({ type: 'hastane', name: '', city: '' });
                    setIsAddUnitOpen(false);
                    showToast('Ünite başarıyla eklendi.');
                } catch (error) { showToast('Hata oluştu.', 'error'); }
            };

            const handleUpdateUnit = async (e) => {
                e.preventDefault();
                if (!editUnitData.name.trim() || !editUnitData.city.trim()) return;
                try {
                    await db.collection('units').doc(editUnitData.id).update({ type: editUnitData.type, name: editUnitData.name, city: editUnitData.city });
                    setIsEditUnitOpen(false); setEditUnitData(null); showToast('Ünite güncellendi.');
                } catch (error) { showToast('Hata oluştu.', 'error'); }
            };

            const handleDeleteUnit = async (unitId) => {
                try { await db.collection('units').doc(unitId).delete(); showToast('Ünite silindi.'); } catch (error) {}
            };

            const handleAddDoctor = async (e) => {
                e.preventDefault();
                if (!newDoctor.name.trim() || !newDoctor.unitId) return;

                const selectedUnit = units.find(u => u.id === newDoctor.unitId);
                if (!selectedUnit) return;

                try {
                    await db.collection('doctors').add({
                        type: newDoctor.type,
                        name: newDoctor.name,
                        hospital: selectedUnit.name,
                        city: selectedUnit.city,
                        unitId: selectedUnit.id,
                        addedByProfileId: activeProfile.id,
                        addedBy: firebaseUser.uid,
                        addedByName: activeProfile.name,
                        createdAt: Date.now()
                    });
                    setNewDoctor({ type: 'doktor', name: '', unitId: '' });
                    setIsAddDoctorOpen(false);
                    showToast('Kontak başarıyla eklendi.');
                } catch (error) { showToast('Hata oluştu.', 'error'); }
            };

            const handleUpdateDoctor = async (e) => {
                e.preventDefault();
                if (!editDoctorData.name.trim() || !editDoctorData.unitId) return;
                
                const selectedUnit = units.find(u => u.id === editDoctorData.unitId);
                if (!selectedUnit) return;

                try {
                    await db.collection('doctors').doc(editDoctorData.id).update({
                        type: editDoctorData.type,
                        name: editDoctorData.name,
                        unitId: selectedUnit.id,
                        hospital: selectedUnit.name,
                        city: selectedUnit.city
                    });
                    setIsEditDoctorOpen(false); setEditDoctorData(null); showToast('Kontak güncellendi.');
                } catch (error) { showToast('Hata oluştu.', 'error'); }
            };

            const handleDeleteDoctor = async (doctorId) => {
                try { await db.collection('doctors').doc(doctorId).delete(); showToast('Kontak silindi.'); } catch (error) {}
            };

            const handleAddVisit = async (e) => {
                e.preventDefault();
                if (newVisit.date > todayISO) { showToast('İleri tarihli işlemleri "Planlarım" sekmesinden yapın.', 'error'); return; }

                try {
                    const isDuplicate = visits.some(visit => visit.repId === activeProfile.id && visit.doctorId === visitingDoctor.id && visit.date === newVisit.date);
                    if (isDuplicate) { showToast('Bugün zaten ziyaret girildi!', 'error'); return; }

                    await db.collection('visits').add({
                        doctorId: visitingDoctor.id,
                        doctorType: visitingDoctor.type || 'doktor',
                        doctorName: visitingDoctor.name,
                        doctorHospital: visitingDoctor.hospital,
                        repId: activeProfile.id,
                        repName: activeProfile.name,
                        date: newVisit.date,
                        notes: newVisit.notes,
                        createdAt: Date.now()
                    });
                    setVisitingDoctor(null); setIsQuickVisitOpen(false); setNewVisit({ date: todayISO, notes: '' });
                    showToast('Ziyaret başarıyla kaydedildi.');
                } catch (error) { showToast('Hata oluştu.', 'error'); }
            };

            const handleDeleteVisit = async (visitId) => {
                try { await db.collection('visits').doc(visitId).delete(); showToast('Ziyaret silindi.'); } catch (error) {}
            };

            // ---- YENİ: Şık, grafikli, tek dosyalık HTML Raporu (Excel raporlarının yerine) ----
            const downloadFullReport = () => {
                if (visits.length === 0 && plans.length === 0) return;

                const repVisitMap = {};
                visits.forEach(v => { repVisitMap[v.repName] = (repVisitMap[v.repName] || 0) + 1; });

                const repPlanMap = {};
                plans.forEach(p => { repPlanMap[p.repName] = (repPlanMap[p.repName] || 0) + 1; });

                const cityMap = {};
                visits.forEach(v => {
                    const doc = doctors.find(d => d.id === v.doctorId);
                    const city = doc ? doc.city : (v.doctorHospital || 'Bilinmeyen');
                    cityMap[city] = (cityMap[city] || 0) + 1;
                });

                const typeMap = { Doktor: 0, Optik: 0 };
                visits.forEach(v => { typeMap[v.doctorType === 'optik' ? 'Optik' : 'Doktor']++; });

                const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

                const visitRows = visits.map(v => `
                    <tr class="border-b border-slate-100">
                        <td class="px-4 py-3 font-medium whitespace-nowrap">${new Date(v.date).toLocaleDateString('tr-TR')}</td>
                        <td class="px-4 py-3"><span class="font-bold text-blue-700 bg-blue-50 border border-blue-100 px-2 py-1 rounded-lg text-xs whitespace-nowrap">${esc(v.repName)}</span></td>
                        <td class="px-4 py-3 font-bold">${esc(v.doctorName)} ${v.doctorType === 'optik' ? '<span class="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded ml-1">OPTİK</span>' : ''}</td>
                        <td class="px-4 py-3 text-slate-500">${esc(v.doctorHospital)}</td>
                        <td class="px-4 py-3 text-slate-500">${esc(v.notes) || '-'}</td>
                    </tr>`).join('');

                const planRows = plans.map(p => `
                    <tr class="border-b border-slate-100">
                        <td class="px-4 py-3 font-medium whitespace-nowrap">${new Date(p.date).toLocaleDateString('tr-TR')}</td>
                        <td class="px-4 py-3"><span class="font-bold text-blue-700 bg-blue-50 border border-blue-100 px-2 py-1 rounded-lg text-xs whitespace-nowrap">${esc(p.repName)}</span></td>

                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-500 font-bold text-xs uppercase tracking-wider border-b border-gray-100">
                                            <tr><th className="px-6 py-4">Tarih</th><th className="px-6 py-4">Temsilci</th><th className="px-6 py-4">Kişi / Kurum Adı</th><th className="px-6 py-4">Kurum / Hastane</th><th className="px-6 py-4">Notlar</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {filteredManagerVisits.length === 0 ? (
                                                <tr><td colSpan="5" className="px-6 py-12 text-center text-gray-500">{managerVisitDateFilter ? 'Bu tarihte ziyaret bulunamadı.' : 'Sistemde henüz kayıt bulunmuyor.'}</td></tr>
                                            ) : (
                                                filteredManagerVisits.map(visit => (
                                                    <tr key={visit.id} className="hover:bg-slate-50/50">
                                                        <td className="px-6 py-4 font-medium text-gray-900">{new Date(visit.date).toLocaleDateString('tr-TR')}</td>
                                                        <td className="px-6 py-4"><span className="font-bold text-blue-700 bg-blue-50 border border-blue-100 px-2.5 py-1 rounded-lg">{visit.repName}</span></td>
                                                        <td className="px-6 py-4 font-bold text-gray-800">{visit.doctorName}</td>
                                                        <td className="px-6 py-4 text-gray-600">{visit.doctorHospital}</td>
                                                        <td className="px-6 py-4 text-gray-600 max-w-md"><div className="line-clamp-2">{visit.notes || '-'}</div></td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'manager-units' && (
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="hidden sm:block overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-500 font-bold text-xs uppercase tracking-wider border-b border-gray-100">
                                            <tr><th className="px-6 py-4">Temsilci</th><th className="px-6 py-4">Tür</th><th className="px-6 py-4">Ünite</th><th className="px-6 py-4">Şehir</th><th className="px-6 py-4 text-right">İşlem</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {units.map(u => (
                                                <tr key={u.id}>
                                                    <td className="px-6 py-4">{u.addedByName}</td><td className="px-6 py-4 font-medium capitalize">{u.type}</td><td className="px-6 py-4 font-bold">{u.name}</td><td className="px-6 py-4">{u.city}</td>
                                                    <td className="px-6 py-4 text-right"><button onClick={()=>handleDeleteUnit(u.id)} className="text-red-400 hover:text-red-600"><Icon name="trash-2" size={20}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'manager-doctors' && (
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="relative border-b border-gray-100">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="search" size={20} className="text-gray-400" /></div>
                                    <input type="text" className="block w-full pl-12 pr-4 py-4 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-800 text-base outline-none transition-all" placeholder="Doktor, optik, kurum veya temsilci ara..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                </div>
                                <div className="hidden sm:block overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-500 font-bold text-xs uppercase tracking-wider border-b border-gray-100">
                                            <tr><th className="px-6 py-4">Temsilci</th><th className="px-6 py-4">Tür</th><th className="px-6 py-4">Kişi</th><th className="px-6 py-4">Ünite</th><th className="px-6 py-4">Şehir</th><th className="px-6 py-4 text-right">İşlem</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {filteredDoctors.map(d => (
                                                <tr key={d.id}>
                                                    <td className="px-6 py-4">{d.addedByName}</td><td className="px-6 py-4 font-medium capitalize">{d.type}</td><td className="px-6 py-4 font-bold">{d.name}</td><td className="px-6 py-4">{d.hospital}</td><td className="px-6 py-4">{d.city}</td>
                                                    <td className="px-6 py-4 text-right"><button onClick={()=>handleDeleteDoctor(d.id)} className="text-red-400 hover:text-red-600"><Icon name="trash-2" size={20}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderLoadingSpinner = () => <div className="flex justify-center items-center h-full min-h-[50vh]"><div className="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div></div>;

            if (!activeProfile) return renderLoginScreen();

            return (
                <div className="min-h-screen flex flex-col">
                    {renderToast()}
                    <header className="bg-white sticky top-0 z-40 shadow-sm border-b border-gray-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6">
                            <div className="flex justify-between items-center h-16 sm:h-20">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center shadow-md">
                                        <Icon name="activity" className="text-white" size={24} />
                                    </div>
                                    <div>
                                        <h1 className="font-black text-xl tracking-tight text-slate-800 leading-none mb-0.5">Merve Optik CRM</h1>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{activeProfile.role === 'manager' ? 'YÖNETİCİ PANELİ' : 'SAHA YÖNETİMİ'}</p>
                                    </div>
                                </div>
                                <div className="hidden sm:flex items-center gap-4">
                                    <div className="flex items-center gap-3 pl-4 border-l border-slate-200">
                                        <div className="text-right">
                                            <p className="text-sm font-bold text-slate-800">{activeProfile.name}</p>
                                            <p className="text-xs text-slate-500 capitalize">{activeProfile.role === 'manager' ? 'Yönetici' : 'Temsilci'}</p>
                                        </div>
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg ${activeProfile.iconColor}`}>{activeProfile.name.charAt(0)}</div>
                                        <button onClick={() => setIsChangePasswordOpen(true)} className="ml-2 p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"><Icon name="key" size={20} /></button>
                                        <button onClick={handleLogout} className="ml-2 p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Icon name="log-out" size={20} /></button>
                                    </div>
                                </div>
                                <button className="sm:hidden p-2 text-slate-600 bg-slate-50 rounded-xl" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}><Icon name="menu" size={24} /></button>
                            </div>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="sm:hidden absolute top-[65px] left-0 w-full bg-white border-b border-gray-100 shadow-xl p-4 z-50">
                                <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl mb-3">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-xl ${activeProfile.iconColor}`}>{activeProfile.name.charAt(0)}</div>
                                        <div>
                                            <p className="font-bold text-slate-800">{activeProfile.name}</p>
                                            <p className="text-xs font-medium text-slate-500">{activeProfile.role === 'manager' ? 'Sistem Yöneticisi' : 'Saha Temsilcisi'}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { setIsChangePasswordOpen(true); setIsMobileMenuOpen(false); }} className="flex-1 flex items-center justify-center gap-2 py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-sm active:scale-95 transition-all"><Icon name="key" size={18} /> Şifre Değiştir</button>
                                    <button onClick={handleLogout} className="flex-1 flex items-center justify-center gap-2 py-3 bg-red-50 text-red-600 rounded-xl font-bold text-sm active:scale-95 transition-all"><Icon name="log-out" size={18} /> Çıkış Yap</button>
                                </div>
                            </div>
                        )}
                    </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-6 sm:py-8">
                        {loading ? renderLoadingSpinner() : (activeProfile.role === 'rep' ? renderRepDashboard() : renderManagerDashboard())}
                    </main>

                    {activeProfile.role === 'rep' && !loading && (
                        <nav className="sm:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-200 flex justify-around items-center h-[72px] pb-safe z-30 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] px-1">
                            <button onClick={() => setActiveTab('plans')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'plans' ? 'text-orange-600' : 'text-slate-400'}`}>
                                <div className={`p-1.5 rounded-xl transition-all ${activeTab === 'plans' ? 'bg-orange-50 scale-110' : ''}`}><Icon name="calendar-days" size={22} strokeWidth={activeTab === 'plans' ? 2.5 : 2} /></div>
                                <span className={`text-[10px] font-bold ${activeTab === 'plans' ? 'text-orange-600' : 'text-slate-500'}`}>Planlarım</span>
                            </button>
                            <button onClick={() => setActiveTab('units')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'units' ? 'text-purple-600' : 'text-slate-400'}`}>
                                <div className={`p-1.5 rounded-xl transition-all ${activeTab === 'units' ? 'bg-purple-50 scale-110' : ''}`}><Icon name="building" size={22} strokeWidth={activeTab === 'units' ? 2.5 : 2} /></div>
                                <span className={`text-[10px] font-bold ${activeTab === 'units' ? 'text-purple-600' : 'text-slate-500'}`}>Üniteler</span>
                            </button>
                            <div className="relative -top-6 px-1">
                                <button onClick={() => setIsQuickVisitOpen(true)} className="w-14 h-14 bg-emerald-500 text-white rounded-full flex items-center justify-center shadow-[0_8px_16px_rgba(16,185,129,0.3)] active:scale-95 transition-transform border-[4px] border-slate-100">
                                    <PlusIcon size={28} strokeWidth={3} />
                                </button>
                            </div>
                            <button onClick={() => setActiveTab('doctors')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'doctors' ? 'text-blue-600' : 'text-slate-400'}`}>
                                <div className={`p-1.5 rounded-xl transition-all ${activeTab === 'doctors' ? 'bg-blue-50 scale-110' : ''}`}><Icon name="users" size={22} strokeWidth={activeTab === 'doctors' ? 2.5 : 2} /></div>
                                <span className={`text-[10px] font-bold ${activeTab === 'doctors' ? 'text-blue-600' : 'text-slate-500'}`}>Kontaklar</span>
                            </button>
                            <button onClick={() => setActiveTab('my-visits')} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${activeTab === 'my-visits' ? 'text-emerald-600' : 'text-slate-400'}`}>
                                <div className={`p-1.5 rounded-xl transition-all ${activeTab === 'my-visits' ? 'bg-emerald-50 scale-110' : ''}`}><Icon name="clipboard-check" size={22} strokeWidth={activeTab === 'my-visits' ? 2.5 : 2} /></div>
                                <span className={`text-[10px] font-bold ${activeTab === 'my-visits' ? 'text-emerald-600' : 'text-slate-500'}`}>Ziyaretler</span>
                            </button>
                        </nav>
                    )}

                    {isAddUnitOpen && renderAddUnitModal()}
                    {isEditUnitOpen && editUnitData && renderEditUnitModal()}
                    {isAddDoctorOpen && renderAddDoctorModal()}
                    {isEditDoctorOpen && editDoctorData && renderEditDoctorModal()}
                    {visitingDoctor && renderAddVisitModal()}
                    {isQuickVisitOpen && renderQuickVisitModal()}
                    {isAddPlanOpen && renderAddPlanModal()}
                    {planVisit.plan && renderPlanVisitModal()}
                    {isChangePasswordOpen && renderChangePasswordModal()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
